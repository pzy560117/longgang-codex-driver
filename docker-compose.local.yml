services:
  mysql:
    image: mysql:8.4
    container_name: export-platform-mysql-local
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: export_platform_test
    ports:
      - "127.0.0.1:33306:3306"
    volumes:
      - export-platform-mysql-data:/var/lib/mysql

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: export-platform-minio-local
    environment:
      MINIO_ROOT_USER: export-platform
      MINIO_ROOT_PASSWORD: export-platform-secret
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:39000:9000"
      - "127.0.0.1:39001:9001"
    volumes:
      - export-platform-minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 export-platform export-platform-secret; do
          sleep 1
        done
        /usr/bin/mc mb --ignore-existing local/export-platform-local-demo
        /usr/bin/mc anonymous set none local/export-platform-local-demo

volumes:
  export-platform-mysql-data:
  export-platform-minio-data:
